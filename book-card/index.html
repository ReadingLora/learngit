<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>书籍卡片 · 置身事内</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <article class="book-card">
      <header class="book-card__header">
        <h1 class="book-card__title">置身事内：中国政府与经济发展</h1>
        <p class="book-card__author">兰小欢 著</p>
      </header>

      <div class="book-card__cover-wrap">
        <img class="book-card__cover" src="cover.jpg" alt="《置身事内》封面">
      </div>

      <p class="book-card__intro">
        本书将经济学原理与中国经济实践结合，用地方政府视角解释财税、债务、工业化与城市化等现象，帮助读者理解「政府在经济中扮演什么角色」。
      </p>

      <footer class="book-card__footer">
        <div class="book-card__progress" role="group" aria-label="阅读进度">
          <div class="book-card__progress-track">
            <div class="book-card__progress-fill"></div>
          </div>
          <span class="book-card__progress-label">70%</span>
        </div>
      </footer>
    </article>
  </main>
</body>
</html>
