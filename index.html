<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Hello, 罗拉的阅读漫步</title>
</head>
<body>
  <h1>Hello, Lora</h1>
  <button id="btn" type="button">点击后弹窗</button>
  <p id="msg"></p>
  <script>
    const btn = document.getElementById('btn');
    btn.addEventListener('click', function () {
        document.getElementById('msg').textContent = '你好啊！欢迎来到罗拉的阅读漫步！';
    });
  </script>
</body>
</html>
