<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的图书 · 阅读器</title>
  <link rel="stylesheet" href="shelf.css">
</head>
<body>
  <div class="shelf-app">
    <aside class="shelf-sidebar" aria-label="导航">
      <input class="shelf-sidebar__search" type="search" placeholder="搜索（占位）" disabled aria-disabled="true">
      <nav aria-label="图书馆">
        <p class="shelf-nav__group-title">图书馆</p>
        <ul class="shelf-nav__list">
          <li class="shelf-nav__item shelf-nav__item--active">全部 <span class="shelf-nav__count">3</span></li>
          <li class="shelf-nav__item">未分类 <span class="shelf-nav__count">3</span></li>
        </ul>
      </nav>
      <p class="shelf-sidebar__hint">MVP1：三本书均可点进阅读页；笔记隔离以 URL 参数 <code>?book=</code> 为准，当前重点测「置身事内」5 条笔记。</p>
    </aside>

    <main class="shelf-main">
      <header class="shelf-main__head">
        <h1 class="shelf-main__title">我的图书</h1>
        <button type="button" class="shelf-main__add" disabled title="占位">+ 添加书籍</button>
      </header>

      <div class="shelf-grid">
        <a class="shelf-book-card" href="index.html?book=jzs">
          <h2 class="shelf-book-card__title">置身事内：中国政府与经济发展</h2>
          <div class="shelf-book-card__cover-wrap">
            <img class="shelf-book-card__cover" src="../book-card/cover.jpg" alt="《置身事内》封面" width="280" height="420">
          </div>
          <footer class="shelf-book-card__footer">
            <div class="shelf-book-card__progress-track" aria-hidden="true">
              <div class="shelf-book-card__progress-fill" style="width: 70%"></div>
            </div>
            <span class="shelf-book-card__progress-label">70%</span>
          </footer>
        </a>

        <a class="shelf-book-card" href="index.html?book=fan">
          <h2 class="shelf-book-card__title">反脆弱</h2>
          <div class="shelf-book-card__cover-wrap">
            <img class="shelf-book-card__cover" src="../book-card/%E3%80%8A%E5%8F%8D%E8%84%86%E5%BC%B1%E3%80%8B.jpg" alt="《反脆弱》封面" width="280" height="420">
          </div>
          <footer class="shelf-book-card__footer">
            <div class="shelf-book-card__progress-track" aria-hidden="true">
              <div class="shelf-book-card__progress-fill" style="width: 12%"></div>
            </div>
            <span class="shelf-book-card__progress-label">12%</span>
          </footer>
        </a>

        <a class="shelf-book-card" href="index.html?book=cell">
          <h2 class="shelf-book-card__title">战斗细胞</h2>
          <div class="shelf-book-card__cover-wrap">
            <img class="shelf-book-card__cover" src="../book-card/%E3%80%8A%E6%88%98%E6%96%97%E7%BB%86%E8%83%9E%E3%80%8B.jpg" alt="《战斗细胞》封面" width="280" height="420">
          </div>
          <footer class="shelf-book-card__footer">
            <div class="shelf-book-card__progress-track" aria-hidden="true">
              <div class="shelf-book-card__progress-fill" style="width: 0%"></div>
            </div>
            <span class="shelf-book-card__progress-label">0%</span>
          </footer>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
